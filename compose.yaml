x-ttrss-env: &ttrss-env
  TTRSS_DB_USER: "${TTRSS_DB_USER:-postgres}"
  TTRSS_DB_NAME: "${TTRSS_DB_NAME:-postgres}"
  TTRSS_DB_PASS: "${TTRSS_DB_PASS:-change-me}"
  TTRSS_SELF_URL_PATH: "${TTRSS_SELF_URL_PATH:-http://localhost:8280/tt-rss/}"
  TZ: "${TZ:-Asia/Tokyo}"

services:
  db:
    image: postgres:12-alpine
    restart: unless-stopped
    networks:
      - default
    environment:
      POSTGRES_USER: "${TTRSS_DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${TTRSS_DB_PASS:-change-me}"
      POSTGRES_DB: "${TTRSS_DB_NAME:-postgres}"
      TZ: "${TZ:-Asia/Tokyo}"
    volumes:
      - "${TTRSS_DB_DIR:-${HOST_DATA_DIR:-./data}/db}:/var/lib/postgresql/data"

  app:
    image: supahgreg/tt-rss:latest
    restart: unless-stopped
    networks:
      - default
    environment:
      <<: *ttrss-env
    depends_on:
      - db
    volumes:
      - "${TTRSS_APP_DIR:-${HOST_DATA_DIR:-./data}/app}:/var/www/html"
      - "${TTRSS_CONFIG_DIR:-${HOST_DATA_DIR:-./data}/config.d}:/opt/tt-rss/config.d:ro"

  updater:
    image: supahgreg/tt-rss:latest
    restart: unless-stopped
    networks:
      - default
    environment:
      <<: *ttrss-env
    depends_on:
      - app
    command: /opt/tt-rss/updater.sh
    volumes:
      - "${TTRSS_APP_DIR:-${HOST_DATA_DIR:-./data}/app}:/var/www/html"
      - "${TTRSS_CONFIG_DIR:-${HOST_DATA_DIR:-./data}/config.d}:/opt/tt-rss/config.d:ro"

  web-nginx:
    image: supahgreg/tt-rss-web-nginx:latest
    restart: unless-stopped
    networks:
      default:
      proxy:
        aliases:
          - "${TTRSS_PROXY_ALIAS:-ttrss}"
    environment:
      <<: *ttrss-env
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8280}:80"
    volumes:
      - "${TTRSS_APP_DIR:-${HOST_DATA_DIR:-./data}/app}:/var/www/html:ro"

networks:
  default:
  proxy:
    external: true
    name: "${PROXY_NETWORK_NAME:-proxy-network}"
